name: CI/CD Production Deployment

# Trigger the workflow every time code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to Local VM
    # This tells GitHub to run the script inside YOUR Debian VM via the runner we installed
    runs-on: self-hosted

    steps:
      # Step 1: Pull the latest code from GitHub into your practice directory
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Clear old build caches to prevent storage buildup
      - name: Prune Docker Builder Cache
        run: docker builder prune -f

      # Step 3: Automatically build the Vite app and restart Nginx
      - name: Deploy Containers
        run: |
          # 1. Move into the workspace where GitHub cloned your files
          cd $GITHUB_WORKSPACE

          # 2. Run your build command using the files in this workspace
          docker compose up -d --build